name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: offer_flow_test
          POSTGRES_USER: offer_flow
          POSTGRES_PASSWORD: offer_flow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U offer_flow -d offer_flow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck -- --incremental false

      - name: Test
        run: npm run test
        env:
          TEST_DATABASE_URL: postgresql://offer_flow:offer_flow@127.0.0.1:5432/offer_flow_test

      - name: Verify production database readiness
        run: |
          npm run db:migrate
          npm run check:production
        env:
          DATABASE_URL: postgresql://offer_flow:offer_flow@127.0.0.1:5432/offer_flow_test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser workflows
        run: npm run test:e2e
